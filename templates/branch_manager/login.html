{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Octos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0f0f0f;
      --ink-2:   #4a4a4a;
      --ink-3:   #9a9a9a;
      --paper:   #ffffff;
      --surface: #f8f8f6;
      --border:  #e8e6e1;
      --accent:  #6b47d9;
      --green:   #22c98a;
      --red:     #e8294a;
      --radius:  14px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    #network-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
      animation: fadeDown 0.5s ease both;
    }

    .brand-mark {
      width: 34px; height: 34px;
      background: var(--ink);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .brand-divider {
      width: 1px; height: 16px;
      background: var(--border);
    }

    .brand-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 40px 36px;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 4px 16px rgba(0,0,0,0.06),
        0 24px 56px rgba(0,0,0,0.06);
      backdrop-filter: blur(12px);
      animation: fadeUp 0.45s ease both;
      animation-delay: 0.05s;
    }

    .card-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .card-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    .card-eyebrow-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 7px;
    }

    .card-sub {
      font-size: 13.5px;
      color: var(--ink-3);
      font-weight: 300;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 -40px 26px;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-3);
      pointer-events: none;
      transition: color 0.15s;
    }

    .input-wrap:focus-within svg { color: var(--ink-2); }

    .form-input {
      width: 100%;
      padding: 12px 13px 12px 40px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--ink);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .form-input:focus {
      border-color: var(--ink);
      background: var(--paper);
      box-shadow: 0 0 0 3px rgba(15,15,15,0.06);
    }

    .form-input::placeholder { color: #c0bdb8; }

    .alert {
      display: none;
      align-items: center;
      gap: 9px;
      padding: 11px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.4;
    }
    .alert.show { display: flex; }
    .alert-error   { background: #fff5f5; border: 1px solid #fecdd3; color: #be123c; }
    .alert-warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }

    .btn-submit {
      width: 100%;
      padding: 13px 20px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      margin-top: 6px;
    }

    .btn-submit:hover:not(:disabled) {
      background: #222;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(15,15,15,0.2);
    }

    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-arrow {
      width: 20px; height: 20px;
      background: rgba(255,255,255,0.12);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .btn-submit:hover .btn-arrow { transform: translateX(2px); }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .card-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-footer-left {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-3);
    }

    .card-footer-right {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-3);
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .tagline {
      margin-top: 24px;
      font-family: 'Syne', sans-serif;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ink-3);
      letter-spacing: 0.04em;
      text-align: center;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.15s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
  </style>
</head>
<body>

  <canvas id="network-canvas"></canvas>

  <div class="shell">

    <div class="brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1.5" fill="white"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" fill="white"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5" fill="white"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" fill="white"/>
        </svg>
      </div>
      <span class="brand-name">Octos</span>
      <span class="brand-divider"></span>
      <span class="brand-sub">Branch Portal</span>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-eyebrow">
          <span class="card-eyebrow-dot"></span>
          Farhat Printing Press
        </div>
        <div class="card-title">Welcome back.</div>
        <div class="card-sub">Sign in to access your branch workspace</div>
      </div>

      <div class="card-divider"></div>

      <div class="alert alert-warning" id="session-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Your session expired. Please sign in again.
      </div>

      <div class="alert alert-error" id="error-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="error-text">Invalid email or password.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" class="form-input" placeholder="you@farhatprinting.com" autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" class="form-input" placeholder="••••••••••••" autocomplete="current-password"/>
        </div>
      </div>

      <button class="btn-submit" id="login-btn" onclick="handleLogin()">
        <span id="btn-text">Sign In</span>
        <div class="spinner" id="btn-spinner"></div>
        <div class="btn-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </button>

      <div class="card-footer">
        <span class="card-footer-left">Octos v2 · The Future People</span>
        <span class="card-footer-right">
          <span class="status-dot"></span>
          All systems operational
        </span>
      </div>
    </div>

    <div class="tagline">Every print job. Every branch. One platform.</div>

  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    // ── Network canvas ──────────────────────────────────────
    (function () {
      const canvas = document.getElementById('network-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, nodes;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        init();
      }

      function init() {
        const count = Math.floor((W * H) / 16000);
        nodes = Array.from({ length: count }, () => ({
          x : Math.random() * W,
          y : Math.random() * H,
          vx: (Math.random() - 0.5) * 0.28,
          vy: (Math.random() - 0.5) * 0.28,
          r : Math.random() * 1.4 + 0.8,
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        nodes.forEach(n => {
          n.x += n.vx;
          n.y += n.vy;
          if (n.x < 0 || n.x > W) n.vx *= -1;
          if (n.y < 0 || n.y > H) n.vy *= -1;
        });

        const MAX = 130;
        ctx.lineWidth = 0.5;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx   = nodes[i].x - nodes[j].x;
            const dy   = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MAX) {
              const a = (1 - dist / MAX) * 0.1;
              ctx.strokeStyle = `rgba(107, 71, 217, ${a})`;
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.stroke();
            }
          }
        }

        nodes.forEach(n => {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(107, 71, 217, 0.15)';
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      draw();
    })();

    // ── Auth ────────────────────────────────────────────────
    if (Auth.isAuthenticated()) Auth.redirectToPortal();

    const params = new URLSearchParams(window.location.search);
    if (params.get('reason') === 'expired') {
      document.getElementById('session-box').classList.add('show');
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const btnText  = document.getElementById('btn-text');
      const spinner  = document.getElementById('btn-spinner');
      const errorBox = document.getElementById('error-box');
      const errorTxt = document.getElementById('error-text');

      errorBox.classList.remove('show');

      if (!email || !password) {
        errorTxt.textContent = 'Please enter your email and password.';
        errorBox.classList.add('show');
        return;
      }

      btn.disabled          = true;
      btnText.textContent   = 'Signing in…';
      spinner.style.display = 'block';

      try {
        const res  = await fetch('/api/v1/auth/token/', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorTxt.textContent = data.detail || 'Invalid email or password.';
          errorBox.classList.add('show');
          return;
        }

        Auth.setTokens(data.access, data.refresh);

        const userRes = await fetch('/api/v1/accounts/me/', {
          headers: { 'Authorization': `Bearer ${data.access}` },
        });
        const user = await userRes.json();
        Auth.setUser(user);

        Auth.redirectToPortal();

      } catch {
        errorTxt.textContent = 'Connection error. Please try again.';
        errorBox.classList.add('show');
      } finally {
        btn.disabled          = false;
        btnText.textContent   = 'Sign In';
        spinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
