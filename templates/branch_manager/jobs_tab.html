{% load static %}
<style>
.jt-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.jt-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#111; }
.jt-link  { font-size:12.5px; color:#aaa; font-weight:500; padding:6px 8px; border-radius:6px; transition:color 0.15s; text-decoration:none; }
.jt-link:hover { color:#333; }

.jt-table { width:100%; border-collapse:collapse; font-size:13px; }

.jt-table thead th {
  text-align:left;
  padding:10px 16px;
  font-size:10.5px;
  font-weight:700;
  letter-spacing:0.8px;
  text-transform:uppercase;
  color:#ccc;
  border-bottom:2px solid #ebebeb;
  border-right: 1px solid #eeeeee;
}

.jt-table tbody td {
  padding:14px 16px;
  border-bottom:1px solid #eeeeee;
  color:#666;
  vertical-align:middle;
}

.jt-table tbody tr:last-child td { border-bottom:none; }
.jt-table tbody tr { transition:background 0.12s; cursor:pointer; }
.jt-table tbody tr:hover { background:#fafafa; }

.jt-job-title {
  font-size:13.5px;
  font-weight:600;
  color:#111;
  line-height:1.3;
  margin-bottom:3px;
}
.jt-job-ref {
  font-family:monospace;
  font-size:11px;
  color:#bbb;
}

.jt-badge {
  display:inline-flex;
  align-items:center;
  padding:3px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  white-space:nowrap;
}

.jt-type {
  display:inline-flex;
  align-items:center;
  padding:3px 9px;
  border-radius:5px;
  font-size:10.5px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.3px;
}

.jt-loading { text-align:center; padding:44px; color:#ccc; font-size:13px; }

.jt-spin {
  display:inline-block;
  width:14px; height:14px;
  border:2px solid #eee;
  border-top-color:#aaa;
  border-radius:50%;
  animation:jt-spin 0.7s linear infinite;
  vertical-align:middle;
  margin-right:6px;
}
@keyframes jt-spin { to { transform:rotate(360deg); } }

.jt-pagination {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid #f5f5f5;
}
.jt-page-info { font-size:12px; color:#bbb; }
.jt-page-btns { display:flex; gap:6px; }
.jt-page-btn {
  padding:5px 14px;
  border-radius:7px;
  border:1px solid #eaeaea;
  background:#fafafa;
  font-size:12px;
  color:#666;
  cursor:pointer;
  transition:all 0.15s;
  font-family:inherit;
}
.jt-page-btn:hover:not(:disabled) { border-color:#ccc; color:#111; }
.jt-page-btn:disabled { opacity:0.35; cursor:not-allowed; }
</style>

<div class="jt-head">
  <span class="jt-title">Recent Jobs</span>
  <a href="/portal/jobs/" class="jt-link">View All Jobs →</a>
</div>

<table class="jt-table">
  <thead>
    <tr>
      <th>Job</th>
      <th>Customer</th>
      <th>Type</th>
      <th>Status</th>
      <th>Est. Cost</th>
    </tr>
  </thead>
  <tbody id="jt-tbody">
    <tr><td colspan="5" class="jt-loading"><span class="jt-spin"></span> Loading…</td></tr>
  </tbody>
</table>

<div class="jt-pagination" id="jt-pagination" style="display:none;">
  <span class="jt-page-info" id="jt-page-info"></span>
  <div class="jt-page-btns">
    <button class="jt-page-btn" id="jt-btn-prev" onclick="JT.prev()">← Prev</button>
    <button class="jt-page-btn" id="jt-btn-next" onclick="JT.next()">Next →</button>
  </div>
</div>

<script>
const JT = (function() {
  const PAGE_SIZE = 10;
  let page = 1, total = 0;

  const STATUS_LABELS = {
    DRAFT:'Draft', CONFIRMED:'Confirmed', BRIEFED:'Briefed',
    DESIGN_IN_PROGRESS:'Design In Progress', SAMPLE_SENT:'Sample Sent',
    REVISION_REQUESTED:'Revision Requested', DESIGN_APPROVED:'Design Approved',
    QUEUED:'Queued', IN_PROGRESS:'In Progress', READY_FOR_PAYMENT:'Ready for Payment',
    PAID:'Paid', OUT_FOR_DELIVERY:'Out for Delivery', COMPLETE:'Complete', CANCELLED:'Cancelled',
  };

  const STATUS_STYLE = {
    DRAFT             : 'background:#f5f5f5;color:#999;border:1px solid #e8e8e8',
    CONFIRMED         : 'background:#fef9ec;color:#b8860b;border:1px solid #f0dda0',
    BRIEFED           : 'background:#fef9ec;color:#b8860b;border:1px solid #f0dda0',
    DESIGN_IN_PROGRESS: 'background:#fef9ec;color:#b8860b;border:1px solid #f0dda0',
    SAMPLE_SENT       : 'background:#fef9ec;color:#b8860b;border:1px solid #f0dda0',
    REVISION_REQUESTED: 'background:#fff3f0;color:#cc3300;border:1px solid #ffc5b5',
    DESIGN_APPROVED   : 'background:#edfaf4;color:#1a7a4a;border:1px solid #b0e0c8',
    QUEUED            : 'background:#fef9ec;color:#b8860b;border:1px solid #f0dda0',
    IN_PROGRESS       : 'background:#fff3f0;color:#cc3300;border:1px solid #ffc5b5',
    READY_FOR_PAYMENT : 'background:#edfaf4;color:#1a7a4a;border:1px solid #b0e0c8',
    PAID              : 'background:#edfaf4;color:#1a7a4a;border:1px solid #b0e0c8',
    OUT_FOR_DELIVERY  : 'background:#edfaf4;color:#1a7a4a;border:1px solid #b0e0c8',
    COMPLETE          : 'background:#edfaf4;color:#1a7a4a;border:1px solid #b0e0c8',
    CANCELLED         : 'background:#f5f5f5;color:#aaa;border:1px solid #e0e0e0',
  };

  const TYPE_STYLE = {
    INSTANT   : 'background:#f0f4ff;color:#3355cc',
    PRODUCTION: 'background:#f9f0ff;color:#7733cc',
    DESIGN    : 'background:#fff0f7;color:#cc3388',
  };

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function load() {
    const tbody = document.getElementById('jt-tbody');
    tbody.innerHTML = `<tr><td colspan="5" class="jt-loading"><span class="jt-spin"></span> Loading…</td></tr>`;

    try {
      // Scope to today's open sheet only
      const sheetRes = await Auth.fetch('/api/v1/finance/sheets/today/');
      if (!sheetRes.ok) {
        tbody.innerHTML = `<tr><td colspan="5" class="jt-loading">No open sheet today.</td></tr>`;
        document.getElementById('jt-pagination').style.display = 'none';
        return;
      }
      const sheet = await sheetRes.json();
      if (sheet.status !== 'OPEN') {
        tbody.innerHTML = `<tr><td colspan="5" class="jt-loading">Today's sheet is closed — jobs archived in the day sheet PDF.</td></tr>`;
        document.getElementById('jt-pagination').style.display = 'none';
        return;
      }

      const params = new URLSearchParams({ page, page_size: PAGE_SIZE, daily_sheet: sheet.id });
      const res    = await Auth.fetch(`/api/v1/jobs/?${params}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const jobs = data.results || data;
      total      = data.count   || jobs.length;

      if (!jobs.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="jt-loading">No jobs yet. <a href="/portal/jobs/" style="color:#111;font-weight:600;">Create one →</a></td></tr>`;
        document.getElementById('jt-pagination').style.display = 'none';
        return;
      }

      tbody.innerHTML = jobs.map(j => {
        const statusStyle = STATUS_STYLE[j.status] || 'background:#f5f5f5;color:#999;';
        const statusLabel = STATUS_LABELS[j.status] || j.status;
        const typeStyle   = TYPE_STYLE[j.job_type]  || '';
        const price       = j.estimated_cost
          ? `GHS ${parseFloat(j.estimated_cost).toLocaleString('en-GH',{minimumFractionDigits:2})}`
          : '—';

        return `
          <tr onclick="window.location='/portal/jobs/'">
            <td>
              <div class="jt-job-title">${esc(j.title || '—')}</div>
              <div class="jt-job-ref">${esc(j.job_number || '#' + j.id)}</div>
            </td>
            <td>${esc(j.customer_name || '—')}</td>
            <td>${j.job_type ? `<span class="jt-type" style="${typeStyle}">${j.job_type}</span>` : '—'}</td>
            <td><span class="jt-badge" style="${statusStyle}">${statusLabel}</span></td>
            <td style="font-family:monospace;font-size:12.5px;">${price}</td>
          </tr>`;
      }).join('');

      const totalPages = Math.ceil(total / PAGE_SIZE);
      const pag = document.getElementById('jt-pagination');

      if (total <= PAGE_SIZE) {
        pag.style.display = 'none';
      } else {
        pag.style.display = 'flex';
        const start = (page - 1) * PAGE_SIZE + 1;
        const end   = Math.min(page * PAGE_SIZE, total);
        document.getElementById('jt-page-info').textContent  = `${start}–${end} of ${total} jobs`;
        document.getElementById('jt-btn-prev').disabled = page <= 1;
        document.getElementById('jt-btn-next').disabled = page >= totalPages;
      }

    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="5" class="jt-loading">Could not load jobs.</td></tr>`;
    }
  }

  load();

  return {
    prev() { if (page > 1) { page--; load(); } },
    next() { if (page < Math.ceil(total / PAGE_SIZE)) { page++; load(); } },
  };
})();
</script>
